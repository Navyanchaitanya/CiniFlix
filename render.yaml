services:
  - type: web
    name: ciniflix
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy --skip-generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        fromService:
          name: ciniflix
          property: renderURL
      - key: DATABASE_URL
        fromDatabase:
          name: ciniflix-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false  # Must be set manually in Render dashboard
    buildFilter:
      paths:
        - src/**
        - prisma/**
        - package.json
        - package-lock.json
        - next.config.js

databases:
  - name: ciniflix-db
    plan: free
    databaseName: ciniflix
