services:
  - type: web
    name: ciniflix
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --skip-generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        fromService:
          name: ciniflix
          property: renderURL
      - key: DATABASE_URL
        sync: false  # Set this in Render dashboard
      - key: NEXTAUTH_SECRET
        sync: false  # Set this in Render dashboard
    buildFilter:
      paths:
        - src/**
        - prisma/**
        - package.json
        - package-lock.json
        - next.config.js
    plan: free
    databaseName: ciniflix
